name: Test Case Project Automation

on:
  issues:
    types: [opened, edited, closed, reopened]
  pull_request:
    types: [opened, closed, ready_for_review, converted_to_draft]
  issue_comment:
    types: [created]

jobs:
  automate-project:
    runs-on: ubuntu-latest
    name: Automate Project Board
    steps:
      - name: Move new test issues to Backlog
        if: github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'test')
        uses: alex-page/github-project-automation-plus@v0.9.0
        with:
          project: OED Test Cases
          column: Backlog
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move assigned issues to In Progress
        if: github.event_name == 'issues' && github.event.issue.assignee != null && contains(github.event.issue.labels.*.name, 'test')
        uses: alex-page/github-project-automation-plus@v0.9.0
        with:
          project: OED Test Cases
          column: In Progress
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move to Testing when PR is opened
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: alex-page/github-project-automation-plus@v0.9.0
        with:
          project: OED Test Cases
          column: Testing
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move to Done when PR is merged
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: alex-page/github-project-automation-plus@v0.9.0
        with:
          project: OED Test Cases
          column: Done
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  notify-discord:
    runs-on: ubuntu-latest
    name: Send Discord Notifications
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    steps:
      - name: Notify on Issue Assignment
        if: github.event_name == 'issues' && github.event.issue.assignee != null
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "📝 Test Case Assigned"
          description: |
            **${{ github.event.issue.assignee.login }}** is working on test case
            **Issue**: ${{ github.event.issue.title }}
            **Link**: ${{ github.event.issue.html_url }}
          color: 0x00AAFF

      - name: Notify on PR Opened
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔍 PR Ready for Review"
          description: |
            **${{ github.event.pull_request.user.login }}** opened a PR
            **PR**: ${{ github.event.pull_request.title }}
            **Link**: ${{ github.event.pull_request.html_url }}
          color: 0xFFAA00

      - name: Notify on PR Merged
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ Test Case Completed!"
          description: |
            **${{ github.event.pull_request.user.login }}** completed a test case
            **PR**: ${{ github.event.pull_request.title }}
            **Tests**: Now merged into development
          color: 0x00FF00
