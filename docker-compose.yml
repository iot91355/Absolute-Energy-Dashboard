version: "3.8"
services:
    # Database service. It's PostgreSQL, see the
    # Dockerfile in ./database
    database:
        build: ./containers/database/
        environment:
            - PGDATA=/var/lib/postgresql/data/pgdata
            - POSTGRES_PASSWORD=pleaseChange
        volumes:
            - ./postgres-data:/var/lib/postgresql/data/pgdata
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 10s
            retries: 3

    web:
        environment:
            - OED_PRODUCTION=no
            - OED_SERVER_PORT=3000
            - OED_DB_USER=oed
            - OED_DB_DATABASE=oed
            - OED_DB_TEST_DATABASE=oed_testing
            - OED_DB_PASSWORD=opened
            - OED_DB_HOST=database
            - OED_DB_PORT=5432
            - OED_TOKEN_SECRET=?
            - OED_LOG_FILE=log.txt
            - OED_MAIL_METHOD=none
            - OED_MAIL_SMTP=smtp.example.com
            - OED_MAIL_SMTP_PORT=465
            - OED_MAIL_IDENT=someone@example.com
            - OED_MAIL_CREDENTIAL=credential
            - OED_MAIL_FROM=mydomain@example.com
            - OED_MAIL_TO=someone@example.com
            - OED_MAIL_ORG=My Organization Name
            - TZ=Etc/UTC
        build:
            context: ./
            dockerfile: ./containers/web/Dockerfile
        links:
            - database
        volumes:
            - ./:/usr/src/app
        ports:
            - "3000:3000" # Keep web app port
            # - "9229:9229" # Debug port commented out to avoid Windows bind error
            # For production you might want something like:
            # - "80:3000"
        depends_on:
            database:
              condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000"]
            interval: 10s
            timeout: 5s
            retries: 5
        command:
            [
                "bash",
                "./src/scripts/installOED.sh",
                "${install_args:-}"
            ]

    # Cypress testing service
    cypress:
      image: cypress/included
      profiles:
        - ui-testing
      environment:
        - CYPRESS_BASE_URL=http://web:3000
        - DISPLAY=:99
      working_dir: /usr/src/app
      depends_on:
        web:
          condition: service_healthy
      volumes:
        - ./:/usr/src/app
      entrypoint: >
        /bin/sh -c "
        rm -f /tmp/.X99-lock &&
        Xvfb :99 -screen 0 1024x768x16"
